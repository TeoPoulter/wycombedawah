<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wycombe Da'wah Donations</title>

<style>
:root {
  --bg: #07090d;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text: #f5f7fb;
  --muted: #9aa3b2;
  --accent: #d4af37;
  --success: #9ee6b8;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, system-ui, sans-serif;
  background:
    radial-gradient(circle at 10% 10%, rgba(212,175,55,0.08), transparent),
    radial-gradient(circle at 90% 20%, rgba(255,255,255,0.05), transparent),
    linear-gradient(180deg, #090b10, #05070b);
  color: var(--text);
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  backdrop-filter: blur(16px);
  background: rgba(0,0,0,0.65);
  border-bottom: 1px solid var(--border);
}

.nav-inner {
  max-width: 1100px;
  margin: auto;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  font-weight: 700;
  letter-spacing: 0.5px;
}

.nav a {
  color: var(--muted);
  margin-left: 16px;
  text-decoration: none;
  transition: 0.2s;
}

.nav a:hover {
  color: var(--text);
}

/* HERO */
.hero {
  text-align: center;
  padding: 90px 20px 50px;
}

.hero h1 {
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  margin: 0;
  letter-spacing: -1px;
}

.hero p {
  margin-top: 14px;
  color: var(--muted);
  font-size: 1.05rem;
}

.hero .btn {
  margin-top: 28px;
}

/* BUTTONS */
.btn {
  display: inline-block;
  padding: 15px 24px;
  border-radius: 999px;
  font-weight: 700;
  text-decoration: none;
  transition: 0.3s;
}

.btn-primary {
  background: linear-gradient(#e2c15b, #cda32d);
  color: black;
  box-shadow: 0 10px 25px rgba(212,175,55,0.2);
}

.btn-secondary {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
}

.btn:hover {
  transform: translateY(-2px);
}

/* SECTION */
.section {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* CARDS */
.cards {
  display: grid;
  gap: 20px;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
}

.card {
  background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.04));
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 24px;
  transition: 0.3s;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform: translateY(-5px);
  border-color: rgba(212,175,55,0.3);
}

.card h3 {
  margin: 0 0 12px;
  font-size: 1.2rem;
}

/* BANK */
.bank {
  margin-top: 12px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding: 13px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
}

.copy {
  background: rgba(255,255,255,0.08);
  border: none;
  padding: 9px 13px;
  border-radius: 10px;
  cursor: pointer;
  color: white;
  font-weight: 600;
}

.copy.copied {
  background: var(--success);
  color: black;
}

/* DUA MESSAGE */
.dua {
  margin-top: 40px;
  text-align: center;
  color: var(--muted);
  font-size: 0.95rem;
  line-height: 1.6;
}

/* ANIMATION */
.reveal {
  opacity: 0;
  transform: translateY(25px);
  transition: 0.8s cubic-bezier(.22,.61,.36,1);
}

.reveal.show {
  opacity: 1;
  transform: translateY(0);
}

/* MOBILE */
@media(max-width:600px){
  .row {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">
    <div class="brand">Wycombe Da'wah</div>
    <div>
      <a href="#donate">Donate</a>
      <a href="#bank">Bank</a>
    </div>
  </div>
</div>

<!-- HERO -->
<section class="hero reveal">
  <h1>Support the Da'wah</h1>
  <p>Quick. Simple. Rewarding.</p>

  <a class="btn btn-primary" href="https://pay.sumup.com/b2c/Q8NPNOMR" target="_blank">
    Donate Now
  </a>
</section>

<!-- OPTIONS -->
<section class="section" id="donate">
  <div class="cards">

    <!-- LINK -->
    <div class="card reveal">
      <h3>Quick Donate</h3>
      <a class="btn btn-primary" href="https://pay.sumup.com/b2c/Q8NPNOMR" target="_blank">
        Open Link
      </a>
    </div>

    <!-- QR -->
    <div class="card reveal">
      <h3>Scan</h3>
      <a class="btn btn-secondary" href="DONATE%20DAWAH%20PDF.pdf" target="_blank">
        Open QR
      </a>
    </div>

    <!-- BANK -->
    <div class="card reveal" id="bank">
      <h3>Bank Transfer</h3>

      <div class="bank">
        <div class="row">
          <div>Teo Poulter</div>
          <button class="copy" data="Teo Poulter">Copy</button>
        </div>

        <div class="row">
          <div>66216656</div>
          <button class="copy" data="66216656">Copy</button>
        </div>

        <div class="row">
          <div>041450</div>
          <button class="copy" data="041450">Copy</button>
        </div>
      </div>

    </div>

  </div>

  <!-- DUA -->
  <div class="dua reveal">
    May Allah reward you immensely for your support and place barakah in your wealth.
  </div>

</section>

<script>
/* reveal animation */
const els = document.querySelectorAll('.reveal');
const obs = new IntersectionObserver(entries=>{
  entries.forEach((e,i)=>{
    if(e.isIntersecting){
      setTimeout(()=> e.target.classList.add('show'), i*100);
    }
  });
});
els.forEach(el=>obs.observe(el));

/* copy */
document.querySelectorAll('.copy').forEach(btn=>{
  btn.onclick = async () => {
    await navigator.clipboard.writeText(btn.getAttribute('data'));
    btn.classList.add('copied');
    btn.innerText = 'Copied';
    setTimeout(()=>{
      btn.classList.remove('copied');
      btn.innerText = 'Copy';
    },1200);
  }
});
</script>

</body>
</html>
